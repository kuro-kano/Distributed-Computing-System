services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-1.0.0}
    image: taskboard:latest
    ports:
      - "3000:3000"
    # Override the host-dev MONGODB_URI in .env (localhost) with the compose
    # service hostname. `environment` wins over any value baked into the image,
    # so `.env` can stay on localhost for `npm run dev` and this Just Works.
    environment:
      MONGODB_URI: mongodb://mongo:27017/taskboard
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - taskboard-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  taskboard-mongo-data:
